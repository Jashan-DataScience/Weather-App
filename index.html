<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
        <title>example</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather App</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .weather-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { padding: 10px; width: 70%; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .weather-info { margin-top: 20px; }
    </style>
</head>
<body>

    <div class="weather-container">
        <input type="text" id="cityInput" placeholder="Enter city name">
        <button id="searchBtn">Search</button>

        <div class="weather-info">
            <h2 id="cityName">City Name</h2>
            <p id="temperature">Temperature: --°C</p>
            <p id="description">Condition: --</p>
        </div>
    </div>

    <script>
        const apiKey = "64a53695b87d8976b7e4729449756708";
        const searchBtn = document.getElementById("searchBtn");
        const cityInput = document.getElementById("cityInput");

        searchBtn.addEventListener("click", () => {
            const city = cityInput.value;
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.cod === 200) {
                        document.getElementById("cityName").innerText = data.name;
                        document.getElementById("temperature").innerText = `Temperature: ${data.main.temp}°C`;
                        document.getElementById("description").innerText = `Condition: ${data.weather[0].description}`;
                    } else {
                        alert("City not found");
                    }
                })
                .catch(error => console.error("Error:", error));
        });
    </script>
</body>
</html>
